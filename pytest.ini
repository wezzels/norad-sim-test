# Test Configuration for GitLab CI/CD

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --tb=short
    --strict-markers
    -ra
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    slow: Slow tests (may take > 5s)
    ballistic: Tests for ballistic calculations
    defense: Tests for defense systems
    detection: Tests for satellite detection
    human: Tests for human player behavior
    scenario: Tests for scenarios

[coverage:run]
source = simulator
branch = True
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    @abstractmethod